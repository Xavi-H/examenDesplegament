services:
  web:
    image: ${IMAGE:-taskmanager:local}
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: taskmanager
      DB_USER: taskuser
      DB_PASS: taskpass

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: taskmanager
      MYSQL_USER: taskuser
      MYSQL_PASSWORD: taskpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql

volumes:
  db_data: